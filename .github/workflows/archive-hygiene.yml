name: Archive hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: archive-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  archive-hygiene:
    name: Archive hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check source archive
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=zip --prefix=rldyour-gemini/ -o dist/rldyour-gemini-source.zip HEAD
          python3 - <<'PY'
          import sys, zipfile
          bad = ('.git/', '__MACOSX/', '.venv/', '.pytest_cache/', '.serena/cache/', '__pycache__/', 'node_modules/')
          with zipfile.ZipFile('dist/rldyour-gemini-source.zip') as zf:
              names = zf.namelist()
          hits = [name for name in names if any(part in name for part in bad)]
          if hits:
              print('forbidden archive entries:', hits[:20], file=sys.stderr)
              raise SystemExit(1)
          print('ok: archive hygiene passed')
          PY

